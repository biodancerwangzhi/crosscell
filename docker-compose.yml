services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
      - cargo-registry:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      # target 目录直接同步到本地，编译后可在 target/release/ 获取二进制文件
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:

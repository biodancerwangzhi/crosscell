name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libhdf5-dev zlib1g-dev libclang-dev
          # CI 使用系统 libhdf5-dev 动态链接（更快）
          # Release 构建使用 --features hdf5-static 静态链接（见 release-cli.yml）

      - name: 缓存 cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 格式检查
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: 编译
        run: cargo build

      - name: 单元测试
        run: cargo test --lib

      # 集成测试需要测试数据，在 CI 中跳过不存在的数据文件
      - name: 集成测试 (可用部分)
        run: cargo test --test test_ir_to_seurat -- --nocapture
        continue-on-error: true

name: Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # Linux 构建 (x86_64, gnu + musl)
  # 使用 hdf5-static feature 静态链接 HDF5（便于分发）
  # ===========================================================================
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x64
          - target: x86_64-unknown-linux-musl
            suffix: linux-x64-static
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: 创建 Cross.toml
        run: |
          cat > Cross.toml << 'EOF'
          [target.x86_64-unknown-linux-gnu]
          pre-build = [
            "DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y cmake pkg-config libclang-dev zlib1g-dev"
          ]

          [target.x86_64-unknown-linux-musl]
          pre-build = [
            "DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y cmake pkg-config libclang-dev zlib1g-dev musl-tools"
          ]
          EOF

      - name: 构建
        run: cross build --release --features hdf5-static --target ${{ matrix.target }}

      - name: 打包
        run: |
          mkdir -p release
          mkdir -p "crosscell-${{ matrix.suffix }}"
          cp target/${{ matrix.target }}/release/crosscell "crosscell-${{ matrix.suffix }}/"
          strip "crosscell-${{ matrix.suffix }}/crosscell" || true
          tar -czvf "release/crosscell-${{ matrix.suffix }}.tar.gz" "crosscell-${{ matrix.suffix }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.suffix }}
          path: release/*.tar.gz

  # ===========================================================================
  # macOS 构建 (Intel + Apple Silicon)
  # ===========================================================================
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: macos-x64
          - target: aarch64-apple-darwin
            suffix: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装构建依赖
        run: brew install cmake

      - name: 构建
        run: cargo build --release --features hdf5-static --target ${{ matrix.target }}

      - name: 打包
        run: |
          mkdir -p release
          mkdir -p "crosscell-${{ matrix.suffix }}"
          cp target/${{ matrix.target }}/release/crosscell "crosscell-${{ matrix.suffix }}/"
          strip "crosscell-${{ matrix.suffix }}/crosscell" || true
          tar -czvf "release/crosscell-${{ matrix.suffix }}.tar.gz" "crosscell-${{ matrix.suffix }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.suffix }}
          path: release/*.tar.gz

  # ===========================================================================
  # Windows 构建 (x86_64)
  # ===========================================================================
  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 构建
        run: cargo build --release --features hdf5-static

      - name: 打包
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          New-Item -ItemType Directory -Force -Path crosscell-windows-x64
          Copy-Item target/release/crosscell.exe crosscell-windows-x64/
          Compress-Archive -Path crosscell-windows-x64 -DestinationPath release/crosscell-windows-x64.zip

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.zip

  # ===========================================================================
  # 创建 GitHub Release
  # ===========================================================================
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理文件
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          echo "=== Release artifacts ==="
          ls -la release/

      - name: 生成校验和
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt || shasum -a 256 * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 安装方式

            ### CLI 二进制（直接下载）
            ```bash
            # Linux x86_64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/crosscell-linux-x64.tar.gz | tar xz
            sudo mv crosscell-linux-x64/crosscell /usr/local/bin/

            # macOS Apple Silicon
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/crosscell-macos-arm64.tar.gz | tar xz
            sudo mv crosscell-macos-arm64/crosscell /usr/local/bin/
            ```

            ### Python
            ```bash
            pip install crosscell
            ```

            ### R
            ```r
            install.packages("crosscell", repos = "https://biodancerwangzhi.r-universe.dev")
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
